<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>백제 왕실 황금보물을 찾아라!</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#2a130d;color:#f7ead0}
    body{min-height:100dvh;overflow:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);background:#2a130d url('/gui/Bg.png') center/cover no-repeat}
    button{font:inherit;border:0;background:transparent;padding:0;margin:0;color:inherit;touch-action:none}
    .hidden{display:none!important}
    .screen{position:relative;width:100%;height:100dvh;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .phone-top{display:none}
    .content{position:relative;width:min(100vw,calc(100dvh * 970 / 2158));height:min(100dvh,calc(100vw * 2158 / 970));margin:0 auto;overflow:hidden}
    .start-title{position:absolute;top:3.1%;left:50%;width:88%;transform:translateX(-50%)}
    .title-machine{position:absolute;top:20.8%;left:50%;width:84%;max-height:57%;object-fit:contain;transform:translateX(-50%);filter:drop-shadow(0 16px 28px rgba(0,0,0,.35))}
    .start-button{position:absolute;left:50%;bottom:5.9%;width:76%;max-width:390px;transform:translateX(-50%)}
    .start-button img,.control-button img,.grab-button img{display:block;width:100%;height:auto;pointer-events:none}
    .start-button:active,.control-button:active,.grab-button:active,.pressed{transform:scale(.95)}
    .play-timer{position:absolute;top:7.4%;left:50%;width:50.2%;max-width:260px;transform:translateX(-50%)}
    .timer-bg{display:block;width:100%;height:auto}
    .timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding-top:.2em;font-weight:900;font-size:clamp(28px,8vw,46px);letter-spacing:.04em;color:#fff0c2;text-shadow:0 2px 5px rgba(0,0,0,.45)}
    .pad{position:absolute;top:33.2%;left:50%;width:77%;max-width:370px;aspect-ratio:1;transform:translateX(-50%);border-radius:50%;background:url('/gui/bg_center.png') center/76% 76% no-repeat;filter:drop-shadow(0 18px 28px rgba(0,0,0,.32))}
    .control-button{position:absolute;width:32%;height:32%;display:flex;align-items:center;justify-content:center;transition:filter .08s ease,opacity .12s ease}
    .control-button:disabled,.grab-button:disabled{opacity:.45;filter:grayscale(.15)}
    .control-button.up{top:0;left:34%}
    .control-button.left{top:34%;left:0}
    .control-button.right{top:34%;right:0}
    .control-button.down{bottom:0;left:34%}
    .grab-button{position:absolute;left:50%;bottom:5.8%;width:42%;max-width:210px;transform:translateX(-50%);transition:filter .08s ease,opacity .12s ease}
    .grab-button:active{transform:translateX(-50%) scale(.95)}
    .status-text{position:absolute;left:8%;right:8%;bottom:2.3%;text-align:center;font-size:13px;color:#e8caa0;text-shadow:0 1px 3px #000}
    .start-status{display:none}
    .result-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;text-align:center;padding:7.6% 6% 5%}
    .relic-frame{position:relative;width:72%;height:auto;aspect-ratio:1162/1810;margin-top:0;display:flex;align-items:center;justify-content:center;background:center/100% 100% no-repeat;filter:drop-shadow(0 14px 22px rgba(0,0,0,.35))}
    .relic-frame.normal{background-image:url('/gui/img_info.png')}
    .relic-frame.prize{width:78%;aspect-ratio:1809/2202;background-image:url('/gui/img_info_gold.png')}
    .relic-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 10px 16px rgba(0,0,0,.28))}
    .name-box{position:relative;width:94%;height:52px;margin:2.8% auto 1.7%;background:url('/gui/Box_name_empty.png') center/100% 100% no-repeat;display:flex;align-items:center;justify-content:center;padding:0 22px;color:#fff2cc;font-weight:900;font-size:clamp(16px,4.4vw,22px);line-height:1.15;text-shadow:0 2px 4px rgba(0,0,0,.45)}
    .result-line{width:78%;height:auto;margin:1.5% auto 2%}
    .description{width:88%;max-height:21%;overflow:auto;margin:0 auto;color:#f2dfbd;font-size:clamp(13px,3.5vw,16px);line-height:1.58;word-break:keep-all;text-shadow:0 1px 3px rgba(0,0,0,.4)}
    .claim{margin-top:auto;width:86%;display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 12px 4px;color:#f8e5bd;font-size:clamp(12px,3.2vw,15px);line-height:1.35;text-align:left;text-shadow:0 1px 3px rgba(0,0,0,.45)}
    .claim img{width:82px;height:82px;background:#fff;padding:5px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.25)}
    .notice-panel{margin:auto;width:86%;padding:28px 22px;border-radius:22px;background:rgba(33,15,9,.82);border:1px solid rgba(255,225,170,.28);text-align:center;box-shadow:0 18px 40px rgba(0,0,0,.35)}
    .notice-panel h1{margin:0 0 12px;font-size:24px;color:#fff0c2}
    .notice-panel p{margin:0;color:#ead1a7;line-height:1.6}
    .spinner{width:54px;height:54px;border:5px solid rgba(255,234,190,.25);border-top-color:#f7d378;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 22px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-height:720px){.claim img{width:68px;height:68px}}
  </style>
</head>
<body>
  <section id="start" class="screen hidden">
    <div class="phone-top"></div>
    <div class="content">
      <img class="start-title" src="/gui/Title.png" alt="백제 왕실 황금보물을 찾아라!">
      <img class="title-machine" src="/gui/Title_img.png" alt="클로 머신">
      <button id="startButton" class="start-button" aria-label="뽑기 시작하기"><img src="/gui/Btn_start.png" alt="뽑기 시작하기"></button>
      <div id="startStatus" class="status-text start-status"></div>
    </div>
  </section>

  <section id="playing" class="screen hidden">
    <div class="phone-top"></div>
    <div class="content">
      <div class="play-timer"><img class="timer-bg" src="/gui/Timer_box.png" alt=""><div id="timer" class="timer-text">01:00</div></div>
      <div class="pad" aria-label="이동 컨트롤러">
        <button class="control-button up" data-action="up" aria-label="위"><img src="/gui/Btn_up.png" alt="위"></button>
        <button class="control-button left" data-action="left" aria-label="왼쪽"><img src="/gui/Btn_left.png" alt="왼쪽"></button>
        <button class="control-button right" data-action="right" aria-label="오른쪽"><img src="/gui/Btn_right.png" alt="오른쪽"></button>
        <button class="control-button down" data-action="down" aria-label="아래"><img src="/gui/Btn_down.png" alt="아래"></button>
      </div>
      <button id="grab" class="grab-button" aria-label="잡기"><img src="/gui/Btn_catch.png" alt="잡기"></button>
      <div id="playStatus" class="status-text">연결 중...</div>
    </div>
  </section>

  <section id="resolving" class="screen hidden">
    <div class="notice-panel"><div class="spinner"></div><h1>결과 확인 중</h1><p>클로가 움직이고 있습니다.<br>잠시만 기다려 주세요.</p></div>
  </section>

  <section id="finished" class="screen hidden">
    <div class="phone-top"></div>
    <div class="content">
      <div class="result-wrap">
        <div id="relicFrame" class="relic-frame normal"><img id="relicImage" class="relic-img" alt="유물 이미지"></div>
        <div id="resultTitle" class="name-box">결과</div>
        <img class="result-line" src="/gui/Line.png" alt="">
        <div id="resultMessage" class="description"></div>
        <div id="claim" class="claim hidden"><img id="claimQr" alt="상품 수령 QR"><div>가까운 직원분에게<br>QR코드를 보여주고<br>선물을 받아 가세요.</div></div>
      </div>
    </div>
  </section>

  <section id="notice" class="screen">
    <div class="notice-panel"><h1 id="noticeTitle">연결 중...</h1><p id="noticeMessage">잠시만 기다려 주세요.</p></div>
  </section>

  <script>
  (()=>{
    const HOLD_MS=100;
    const params=new URLSearchParams(location.search);
    const playToken=params.get('token');
    const resultToken=params.get('result');
    const screens=['start','playing','resolving','finished','notice'];
    const show=id=>screens.forEach(x=>document.getElementById(x).classList.toggle('hidden',x!==id));
    const notice=(title,message)=>{document.querySelector('#noticeTitle').textContent=title;document.querySelector('#noticeMessage').textContent=message;show('notice')};
    const fmt=seconds=>{const s=Math.max(0,Number(seconds)||0);return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`};
    const buttons=[...document.querySelectorAll('.control-button')];
    const grab=document.querySelector('#grab');
    const startButton=document.querySelector('#startButton');
    const held=new Map();
    let ws=null,resultUrl=null,finished=false,artifactData=null,bound=false,started=false,startDeadlineTimer=null;

    function stop(action){const x=held.get(action);if(!x)return;clearInterval(x.timer);x.button.classList.remove('pressed');held.delete(action);send(action,'stop')}
    function stopAll(){[...held.keys()].forEach(stop)}
    function send(action,phase){if(ws?.readyState===1)ws.send(JSON.stringify(phase?{type:'input',action,phase}:{type:'input',action}))}
    function setControlsDisabled(disabled){buttons.forEach(b=>b.disabled=disabled);grab.disabled=disabled}
    function disable(){stopAll();setControlsDisabled(true)}
    function clearStartDeadline(){if(startDeadlineTimer){clearTimeout(startDeadlineTimer);startDeadlineTimer=null}}
    function bind(){if(bound)return;bound=true;buttons.forEach(b=>{const a=b.dataset.action,start=e=>{e.preventDefault();if(held.has(a)||b.disabled)return;b.classList.add('pressed');send(a,'start');held.set(a,{button:b,timer:setInterval(()=>send(a,'hold'),HOLD_MS)})};['pointerdown','touchstart'].forEach(ev=>b.addEventListener(ev,start,{passive:false}));['pointerup','pointercancel','pointerleave','touchend','touchcancel'].forEach(ev=>b.addEventListener(ev,()=>stop(a),{passive:false}))});grab.addEventListener('click',()=>{if(grab.disabled)return;disable();send('grab')})}
    async function artifactByIndex(index){if(index===null||index===undefined)return null;if(!artifactData){try{const r=await fetch('/artifacts.json',{cache:'no-store'});artifactData=r.ok?await r.json():{artifacts:[]}}catch{artifactData={artifacts:[]}}}return (artifactData.artifacts||[]).find(x=>Number(x.index)===Number(index))||null}
    function relicImageUrl(index){const n=Number(index);if(!Number.isFinite(n))return '/gui/relic/01.png';return `/gui/relic/${String(n+1).padStart(2,'0')}.png`}
    async function showResult(data){finished=true;disable();show('finished');const artifact=await artifactByIndex(data.artifactIndex);const hasClaim=Boolean(data.claimUrl)&&(data.result==='gold'||data.result==='silver');const frame=document.querySelector('#relicFrame');const img=document.querySelector('#relicImage');const title=document.querySelector('#resultTitle');const message=document.querySelector('#resultMessage');const claim=document.querySelector('#claim');frame.className=`relic-frame ${hasClaim?'prize':'normal'}`;img.src=relicImageUrl(data.artifactIndex);img.alt=artifact?.name||'유물 이미지';title.textContent=artifact?.name || (hasClaim?'당첨 결과':'결과');message.textContent=artifact?.description || '참여해주셔서 감사합니다.';claim.classList.toggle('hidden',!hasClaim);if(hasClaim)document.querySelector('#claimQr').src=`/qr?text=${encodeURIComponent(data.claimUrl)}`}
    async function recover(urlToken){show('resolving');const poll=async()=>{try{const r=await fetch(`/api/results/${encodeURIComponent(urlToken)}`,{cache:'no-store'});const data=await r.json();if(r.status===200)return showResult(data);if(r.status===202)return setTimeout(poll,1000);notice('만료된 결과 링크','오늘 운영 시간이 종료되었거나 상품 수령이 완료되었습니다.')}catch{setTimeout(poll,1500)}};poll()}
    function connect(){const scheme=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(`${scheme}//${location.host}/play?token=${encodeURIComponent(playToken)}`);ws.onmessage=e=>{let m;try{m=JSON.parse(e.data)}catch{return}if(m.type==='claimed'){show('start');startButton.disabled=false;clearStartDeadline();startDeadlineTimer=setTimeout(()=>notice('시작 시간이 만료되었습니다','키오스크에서 새 QR 코드를 다시 스캔해 주세요.'),(Number(m.startTimeoutSeconds)||30)*1000+800)}else if(m.type==='session_started'){clearStartDeadline();resultUrl=m.resultUrl;history.replaceState(null,'',m.resultUrl);document.querySelector('#timer').textContent=fmt(m.duration);document.querySelector('#playStatus').textContent='조작 가능';show('playing');setControlsDisabled(false);bind()}else if(m.type==='tick'){document.querySelector('#timer').textContent=fmt(m.remaining)}else if(m.type==='resolving'){disable();show('resolving')}else if(m.type==='result'){showResult(m)}else if(m.type==='error'){notice('처리 오류','키오스크에서 새 QR 코드를 스캔해 주세요.')}else if(m.type==='session_ended'&&!finished&&m.reason!=='completed'){notice('플레이 종료','키오스크에서 새 QR 코드를 스캔해 주세요.')}};ws.onclose=()=>{clearStartDeadline();if(finished)return;const token=resultUrl?new URL(resultUrl).searchParams.get('result'):null;if(token)recover(token);else notice('연결이 종료되었습니다','키오스크에서 새 QR 코드를 스캔해 주세요.')}}
    setControlsDisabled(true);
    if(resultToken&&!playToken){recover(resultToken);return}
    if(!playToken){notice('잘못된 접속','키오스크의 QR 코드를 다시 스캔해 주세요.');return}
    startButton.disabled=true;
    show('notice');
    connect();
    startButton.addEventListener('click',()=>{if(started||ws?.readyState!==1)return;started=true;startButton.disabled=true;ws.send(JSON.stringify({type:'start'}))});
  })();
  </script>
</body>
</html>
