<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#f4f1ec" />
<title>클로 머신 컨트롤러</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overscroll-behavior: none;
    touch-action: manipulation;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Apple SD Gothic Neo", sans-serif;
    background: #f4f1ec;
    color: #2a2520;
  }
  body {
    display: flex; flex-direction: column;
    height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ─── 상단 바 ───────────────────────────────────── */
  .topbar {
    flex: 0 0 auto;
    padding: 26px 26px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .timer {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .timer .num {
    font-size: 44px;
    font-weight: 500;
    color: #2a2520;
    letter-spacing: -0.04em;
    line-height: 1;
    font-feature-settings: 'tnum';
  }
  .timer .unit {
    font-size: 13px;
    color: #a39788;
    font-weight: 500;
  }
  .timer.warn .num { color: #c87f5e; }

  .status {
    background: rgba(255,255,255,0.6);
    border-radius: 999px;
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 7px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #6ba368;
  }
  .status.warn .dot { background: #d4a04a; }
  .status.err  .dot { background: #c87f5e; }
  .status .label {
    font-size: 11px;
    color: #6e6256;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ─── 컨트롤 영역 ───────────────────────────────── */
  .stage {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px;
    padding: 0 0 28px;
    min-height: 0;
  }

  /* ─── D-pad ────────────────────────────────────── */
  .dpad {
    position: relative;
    width: 232px;
    height: 232px;
  }
  .dpad-btn {
    position: absolute;
    width: 76px;
    height: 76px;
    background: #faf7f2;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 2px 6px rgba(140,120,100,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s ease, box-shadow 0.12s ease, transform 0.08s ease;
    border: 0;
    padding: 0;
    cursor: pointer;
  }
  .dpad-btn svg {
    transition: stroke 0.12s ease, transform 0.08s ease;
  }
  .dpad-btn .arrow {
    stroke: #b8ac9c;
  }
  .dpad-btn.up    { top: 0;    left: 78px;  border-radius: 22px 22px 6px 6px; align-items: flex-start; padding-top: 20px; }
  .dpad-btn.left  { top: 78px; left: 0;     border-radius: 22px 6px 6px 22px; justify-content: flex-start; padding-left: 20px; }
  .dpad-btn.right { top: 78px; right: 0;    border-radius: 6px 22px 22px 6px; justify-content: flex-end; padding-right: 20px; }
  .dpad-btn.down  { bottom: 0; left: 78px;  border-radius: 6px 6px 22px 22px; align-items: flex-end; padding-bottom: 20px; }

  .dpad-btn.pressed {
    background: #c9a472;
    box-shadow:
      0 4px 12px rgba(174,131,75,0.3),
      0 1px 0 rgba(255,255,255,0.25) inset,
      0 -2px 0 rgba(120,85,40,0.2) inset;
    transform: scale(0.97);
  }
  .dpad-btn.pressed .arrow {
    stroke: #ffffff;
    stroke-width: 2.25;
  }

  /* 가운데 장식 (눌리지 않음) */
  .dpad-center {
    position: absolute;
    top: 78px; left: 78px;
    width: 76px; height: 76px;
    background: #ebe6dd;
    border-radius: 6px;
    pointer-events: none;
  }

  /* ─── 잡기 버튼 ────────────────────────────────── */
  .grab {
    width: 200px;
    height: 88px;
    border: 0;
    border-radius: 44px;
    background: #c87f5e;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 8px 20px rgba(180,100,70,0.3),
      0 1px 0 rgba(255,255,255,0.35) inset,
      0 -3px 0 rgba(140,70,45,0.3) inset;
    transition: transform 0.08s ease, box-shadow 0.12s ease;
    cursor: pointer;
    padding: 0;
  }
  .grab:active {
    transform: translateY(2px);
    box-shadow:
      0 4px 10px rgba(180,100,70,0.3),
      0 1px 0 rgba(255,255,255,0.35) inset,
      0 -1px 0 rgba(140,70,45,0.3) inset;
  }
  .grab:disabled { opacity: 0.4; }

  /* ─── 오버레이 ─────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0;
    background: #f4f1ec;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px;
    text-align: center;
    z-index: 10;
  }
  .overlay .icon {
    width: 64px; height: 64px;
    margin-bottom: 24px;
    color: #a39788;
  }
  .overlay h1 {
    font-size: 22px;
    margin: 0 0 12px;
    font-weight: 500;
    color: #2a2520;
    letter-spacing: -0.01em;
  }
  .overlay p {
    font-size: 14px;
    color: #6e6256;
    margin: 4px 0;
    line-height: 1.6;
  }
  .overlay.success .icon { color: #6ba368; }
  .overlay.warn .icon    { color: #d4a04a; }
  .overlay.err .icon     { color: #c87f5e; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- 컨트롤러 화면 -->
<div id="play" class="hidden">
  <div class="topbar">
    <div class="timer" id="timer">
      <span class="num" id="timerNum">--</span>
      <span class="unit">초</span>
    </div>
    <div class="status" id="status">
      <span class="dot"></span>
      <span class="label" id="statusLabel">연결 중</span>
    </div>
  </div>

  <div class="stage">
    <div class="dpad">
      <button class="dpad-btn up" data-action="up" aria-label="위">
        <svg class="arrow" width="20" height="14" viewBox="0 0 20 14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 2 11 L 10 3 L 18 11"/></svg>
      </button>
      <button class="dpad-btn left" data-action="left" aria-label="왼쪽">
        <svg class="arrow" width="14" height="20" viewBox="0 0 14 20" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 11 2 L 3 10 L 11 18"/></svg>
      </button>
      <div class="dpad-center"></div>
      <button class="dpad-btn right" data-action="right" aria-label="오른쪽">
        <svg class="arrow" width="14" height="20" viewBox="0 0 14 20" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 3 2 L 11 10 L 3 18"/></svg>
      </button>
      <button class="dpad-btn down" data-action="down" aria-label="아래">
        <svg class="arrow" width="20" height="14" viewBox="0 0 20 14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 2 3 L 10 11 L 18 3"/></svg>
      </button>
    </div>

    <button class="grab" id="grab" aria-label="잡기">
      <svg viewBox="0 0 48 48" width="38" height="38" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="24" y1="6" x2="24" y2="18"/>
        <rect x="20" y="18" width="8" height="6" rx="1"/>
        <path d="M 20 24 L 14 38 L 18 40 L 22 28"/>
        <path d="M 28 24 L 34 38 L 30 40 L 26 28"/>
      </svg>
    </button>
  </div>
</div>

<!-- 오버레이: unavailable / ended -->
<div id="overlay" class="overlay">
  <svg class="icon" id="ovIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="12 6 12 12 16 14"/>
  </svg>
  <h1 id="ovTitle">연결 중...</h1>
  <p id="ovMessage">잠시만 기다려주세요</p>
</div>

<script>
(() => {
  // ─── 설정 ───────────────────────────────────────
  const HOLD_INTERVAL_MS = 100;

  // ─── URL 파라미터 ─────────────────────────────────
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  // 인앱 브라우저 감지 (카카오/네이버/페이스북 등)
  const ua = navigator.userAgent || '';
  const isInApp = /KAKAOTALK|NAVER|FBAN|FBAV|Instagram|Line/i.test(ua);

  // ─── DOM ─────────────────────────────────────────
  const $play       = document.getElementById('play');
  const $overlay    = document.getElementById('overlay');
  const $ovIcon     = document.getElementById('ovIcon');
  const $ovTitle    = document.getElementById('ovTitle');
  const $ovMsg      = document.getElementById('ovMessage');
  const $timer      = document.getElementById('timer');
  const $timerNum   = document.getElementById('timerNum');
  const $status     = document.getElementById('status');
  const $statusLabel= document.getElementById('statusLabel');
  const $grab       = document.getElementById('grab');
  const dpadButtons = document.querySelectorAll('.dpad-btn');

  // ─── 아이콘 SVG (오버레이용) ────────────────────────
  const ICONS = {
    clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
    qr:    '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="14" x2="14" y2="17"/><line x1="14" y1="20" x2="14" y2="21"/><line x1="17" y1="14" x2="21" y2="14"/><line x1="17" y1="17" x2="17" y2="21"/><line x1="20" y1="17" x2="21" y2="17"/><line x1="20" y1="20" x2="21" y2="20"/>',
    wifi:  '<path d="M 5 12 a 10 10 0 0 1 14 0"/><path d="M 8 15 a 6 6 0 0 1 8 0"/><line x1="12" y1="19" x2="12" y2="19"/>',
    wrench:'<path d="M 14 7 a 4 4 0 1 1 -3 7 L 4 21 L 3 20 L 10 13 a 4 4 0 0 1 4 -6 z"/>',
    hourglass: '<path d="M 6 3 h 12 M 6 21 h 12"/><path d="M 6 3 v 4 a 6 6 0 0 0 12 0 v -4"/><path d="M 6 21 v -4 a 6 6 0 0 1 12 0 v 4"/>',
    check: '<circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/>',
    smile: '<circle cx="12" cy="12" r="10"/><path d="M 8 14 a 4 4 0 0 0 8 0"/><circle cx="9" cy="10" r="0.5" fill="currentColor"/><circle cx="15" cy="10" r="0.5" fill="currentColor"/>',
    link:  '<path d="M 10 14 a 5 5 0 0 1 0 -7 l 3 -3 a 5 5 0 0 1 7 7 l -1 1"/><path d="M 14 10 a 5 5 0 0 1 0 7 l -3 3 a 5 5 0 0 1 -7 -7 l 1 -1"/>',
  };

  function setOverlayIcon(name) {
    const svg = ICONS[name] || ICONS.clock;
    $ovIcon.innerHTML = svg;
  }

  // ─── 화면 전환 ───────────────────────────────────
  function showPlayable() {
    $overlay.classList.add('hidden');
    $play.classList.remove('hidden');
  }
  function showOverlay({ icon, title, msg, mood }) {
    $play.classList.add('hidden');
    $overlay.classList.remove('hidden');
    $overlay.classList.remove('success', 'warn', 'err');
    if (mood) $overlay.classList.add(mood);
    setOverlayIcon(icon || 'clock');
    $ovTitle.textContent = title || '';
    $ovMsg.textContent = msg || '';
  }
  function setStatus(text, cls) {
    $statusLabel.textContent = text;
    $status.classList.remove('warn', 'err');
    if (cls) $status.classList.add(cls);
  }

  // ─── 사전 검증 ───────────────────────────────────
  if (!token) {
    showOverlay({
      icon: 'link', mood: 'warn',
      title: '잘못된 접속',
      msg: 'QR 코드를 다시 스캔해주세요.',
    });
    return;
  }
  if (isInApp) {
    showOverlay({
      icon: 'link', mood: 'warn',
      title: '외부 브라우저로 열어주세요',
      msg: '오른쪽 위 메뉴에서 "다른 브라우저로 열기"를 선택해주세요.',
    });
    return;
  }

  // ─── WebSocket 관리 ─────────────────────────────
  const wsScheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${wsScheme}//${location.host}/play?token=${encodeURIComponent(token)}`;

  let ws = null;
  let sessionStarted = false;
  let endedReason = null;

  function connect() {
    setStatus('연결 중', 'warn');
    ws = new WebSocket(wsUrl);

    ws.onopen = () => setStatus('연결됨');
    ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      handleServerMessage(msg);
    };
    ws.onerror = () => { /* close가 뒤따라옴 */ };
    ws.onclose = () => {
      if (endedReason) return;

      if (!sessionStarted) {
        setTimeout(() => {
          if (!endedReason && !sessionStarted) {
            showUnavailable('connection_failed');
          }
        }, 100);
        return;
      }

      // 세션 진행 중 끊김
      showOverlay({
        icon: 'wifi', mood: 'err',
        title: '연결이 끊어졌습니다',
        msg: '키오스크에서 새 QR 코드를 스캔해주세요.',
      });
    };
  }

  function handleServerMessage(msg) {
    switch (msg.type) {
      case 'session_started':
        sessionStarted = true;
        $timerNum.textContent = String(msg.duration ?? '--');
        showPlayable();
        bindControls();
        break;

      case 'tick':
        $timerNum.textContent = String(msg.remaining ?? '');
        if (typeof msg.remaining === 'number' && msg.remaining <= 5) {
          $timer.classList.add('warn');
        } else {
          $timer.classList.remove('warn');
        }
        break;

      case 'session_ended':
        endedReason = msg.reason;
        unbindControls();
        showSessionEnded(msg.reason, msg.result);
        try { ws.close(); } catch {}
        break;

      case 'error':
        showUnavailable(msg.code);
        try { ws.close(); } catch {}
        break;
    }
  }

  function showUnavailable(code) {
    endedReason = endedReason ?? code;
    const map = {
      invalid_token:    { icon: 'qr',     mood: 'warn', title: '만료된 QR 코드', msg: '키오스크의 새 QR을 다시 스캔해주세요.' },
      kiosk_offline:    { icon: 'wrench', mood: 'warn', title: '잠시 점검 중',   msg: '키오스크 연결이 복구되면 다시 시도해주세요.' },
      already_in_use:   { icon: 'hourglass', mood: 'warn', title: '다른 분이 이용 중', msg: '잠시 후 다시 시도해주세요.' },
      bad_request:      { icon: 'link',   mood: 'warn', title: '올바르지 않은 접속', msg: 'QR 코드를 다시 스캔해주세요.' },
      connection_failed:{ icon: 'wifi',   mood: 'err',  title: '연결할 수 없습니다', msg: '네트워크를 확인하고 다시 시도해주세요.' },
    };
    const info = map[code] ?? { icon: 'clock', mood: 'warn', title: '연결 오류', msg: code };
    showOverlay(info);
  }

  function showSessionEnded(reason, result) {
    if (reason === 'completed') {
      const success = result === 'success';
      showOverlay({
        icon: success ? 'smile' : 'check',
        mood: success ? 'success' : null,
        title: success ? '성공!' : '플레이 종료',
        msg: '수고하셨습니다.',
      });
    } else if (reason === 'timeout') {
      showOverlay({
        icon: 'hourglass', mood: 'warn',
        title: '시간 종료', msg: '수고하셨습니다.',
      });
    } else {
      showOverlay({
        icon: 'wifi', mood: 'err',
        title: '연결이 끊어졌습니다',
        msg: '키오스크에서 새 QR 코드를 스캔해주세요.',
      });
    }
  }

  // ─── 입력 처리 ──────────────────────────────────
  const heldButtons = new Map();

  function sendInput(action, phase) {
    if (!ws || ws.readyState !== 1) return;
    const payload = phase ? { type: 'input', action, phase } : { type: 'input', action };
    try { ws.send(JSON.stringify(payload)); } catch {}
  }

  function startHold(action, btn) {
    if (heldButtons.has(action)) return;
    btn.classList.add('pressed');
    sendInput(action, 'start');
    const id = setInterval(() => sendInput(action, 'hold'), HOLD_INTERVAL_MS);
    heldButtons.set(action, { id, btn });
  }

  function stopHold(action) {
    const entry = heldButtons.get(action);
    if (!entry) return;
    clearInterval(entry.id);
    entry.btn.classList.remove('pressed');
    heldButtons.delete(action);
    sendInput(action, 'stop');
  }

  function stopAllHolds() {
    for (const action of [...heldButtons.keys()]) stopHold(action);
  }

  let listenersBound = false;
  function bindControls() {
    if (listenersBound) return;
    listenersBound = true;

    dpadButtons.forEach((btn) => {
      const action = btn.dataset.action;

      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startHold(action, btn);
      }, { passive: false });
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopHold(action);
      }, { passive: false });
      btn.addEventListener('touchcancel', () => stopHold(action));

      // 데스크탑 디버깅
      btn.addEventListener('mousedown', () => startHold(action, btn));
      btn.addEventListener('mouseup', () => stopHold(action));
      btn.addEventListener('mouseleave', () => stopHold(action));
    });

    $grab.addEventListener('click', () => sendInput('grab'));

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopAllHolds();
    });
    window.addEventListener('blur', stopAllHolds);
  }

  function unbindControls() {
    stopAllHolds();
    dpadButtons.forEach(btn => btn.disabled = true);
    $grab.disabled = true;
  }

  // ─── 부팅 ────────────────────────────────────────
  // 초기 오버레이
  showOverlay({
    icon: 'clock',
    title: '연결 중...',
    msg: '잠시만 기다려주세요',
  });
  connect();
})();
</script>
</body>
</html>
